function getResultMap() {
  return Object.fromEntries(RESULTS.map(r => [r.home+"|"+r.away, r]));
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function findWinner(team) {
  if (!team) return null;
  return DRAW.find(d => d.teams.some(t => t.toLowerCase() === team.toLowerCase()));
}

async function refreshResults() {
  setState({refreshing:true, refreshError:null});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:3000,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:"Search for all FIFA World Cup 2026 match results so far. Return ONLY a JSON array, no markdown, no explanation: [{\"home\":\"TeamName\",\"away\":\"TeamName\",\"hs\":0,\"as\":0,\"date\":\"Jun 11\"}]. Use these exact team names: Mexico, South Africa, Canada, Bosnia & Herzegovina, South Korea, Czechia, United States, Paraguay, Morocco, Scotland, Brazil, Haiti, Qatar, Switzerland, Australia, Turkiye, Germany, Curacao, Netherlands, Japan, Cote d'Ivoire, Ecuador, Sweden, Tunisia, Spain, Cape Verde, Belgium, Egypt, Saudi Arabia, Uruguay, Iran, New Zealand, France, Senegal, Iraq, Norway, Argentina, Algeria, Austria, Jordan, Portugal, DR Congo, England, Croatia, Ghana, Panama, Uzbekistan, Colombia. Only include finished matches."}]
      })
    });
    const ai = await res.json();
    const text = (ai.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const m = text.match(/\[[\s\S]*\]/);
    if (!m) throw new Error("Parse error");
    const parsed = JSON.parse(m[0]);
    if (Array.isArray(parsed) && parsed.length > 0) {
      RESULTS = parsed;
      setState({refreshing:false, lastUpdated:new Date(), refreshError:null});
    } else throw new Error("No data");
  } catch(e) {
    setState({refreshing:false, refreshError:"Could not fetch results. Try again."});
  }
}

// Schedule auto-refresh at 5am BST (4am UTC) daily
function scheduleAutoRefresh() {
  const now = new Date();
  const next = new Date();
  next.setUTCHours(4,0,0,0);
  if (next <= now) next.setUTCDate(next.getUTCDate()+1);
  setTimeout(() => {
    refreshResults();
    setInterval(refreshResults, 24*60*60*1000);
  }, next - now);
}
scheduleAutoRefresh();

        ${PRIZES.map(prize=>{
          const pw=state.prizeWinners[prize.id];
          const isEditing=state.editingPrize===prize.id;
          return `<div class="card" style="border-color:${pw?prize.colour+'77':'#1e2a3a'}">
            <div style="padding:15px 17px;display:flex;align-items:center;gap:13px;background:${pw?'linear-gradient(90deg,'+prize.colour+'18,#111827)':'#111827'}">
              <div style="font-size:28px;flex-shrink:0">${prize.emoji}</div>
              <div style="flex:1">
                <div style="font-weight:800;font-size:14px;color:${pw?prize.colour:'#f1f5f9'}">${prize.title}</div>
                <div style="font-size:11px;color:#64748b;margin-top:2px">${prize.desc}</div>
              </div>
              ${!pw&&!isEditing?`<button onclick="setState({editingPrize:'${prize.id}',teamInput:'',suggestions:[]})" style="padding:7px 13px;background:${prize.colour};color:#000;border:none;border-radius:7px;font-weight:700;font-size:11px;cursor:pointer;flex-shrink:0">Set</button>`:""}
              ${pw?`<button onclick="clearPrize('${prize.id}')" style="padding:5px 9px;background:transparent;color:#64748b;border:1px solid #1e2a3a;border-radius:7px;font-size:11px;cursor:pointer;flex-shrink:0">Edit</button>`:""}
            </div>
            ${pw?`<div style="padding:13px 17px;display:flex;align-items:center;gap:13px;border-top:1px solid #1e2a3a">
              <div style="font-size:26px">${FLAG(pw.team)}</div>
              <div><div style="font-size:11px;color:#64748b;margin-bottom:2px">Team</div><div style="font-weight:700;font-size:15px">${pw.team}</div></div>
              <div style="margin-left:16px"><div style="font-size:11px;color:#64748b;margin-bottom:2px">Winner 🎉</div><div style="font-weight:800;font-size:17px;color:${prize.colour}">${pw.player}</div></div>
            </div>`:""}
            ${isEditing?`<div style="padding:13px 17px;border-top:1px solid #1e2a3a">
              <div style="font-size:12px;color:#64748b;margin-bottom:7px">Which team?</div>
              <div style="position:relative">
                <input id="team-input" value="${state.teamInput}" oninput="handleTeamInput(this.value)" placeholder="Type team name..." style="width:100%;padding:10px 13px;background:#1e2a3a;border:1px solid #1e2a3a;border-radius:8px;color:#f1f5f9;font-size:14px;outline:none">
                ${state.suggestions.length>0?`<div style="position:absolute;top:100%;left:0;right:0;background:#1a2235;border:1px solid #1e2a3a;border-radius:8px;z-index:10;overflow:hidden;margin-top:3px">
                  ${state.suggestions.map(s=>`<div onclick="selectSuggestion('${s}')" style="padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px" onmouseover="this.style.background='#1e2a3a'" onmouseout="this.style.background=''">${FLAG(s)} ${s}</div>`).join("")}
                </div>`:""}
              </div>
              <div style="display:flex;gap:8px;margin-top:9px">
                <button onclick="confirmPrize('${prize.id}')" ${!findWinner(state.teamInput)?'disabled':''} style="flex:1;padding:10px;font-weight:700;font-size:13px;background:${findWinner(state.teamInput)?prize.colour:'#1e2a3a'};color:${findWinner(state.teamInput)?'#000':'#64748b'};border:none;border-radius:7px;cursor:${findWinner(state.teamInput)?'pointer':'not-allowed'}">Confirm</button>
                <button onclick="setState({editingPrize:null,teamInput:'',suggestions:[]})" style="padding:10px 14px;font-weight:700;font-size:13px;background:#1e2a3a;color:#64748b;border:1px solid #1e2a3a;border-radius:7px;cursor:pointer">Cancel</button>
              </div>
            </div>`:""}
          </div>`;
        }).join("")}
      </div>
      ${totalPrizes===PRIZES.length?`<div style="margin-top:26px;padding:18px;background:linear-gradient(135deg,#1a1200,#111827);border:2px solid #f59e0b;border-radius:13px;text-align:center">
        <div style="font-size:30px;margin-bottom:7px">🏆</div>
        <div style="font-weight:900;font-size:17px;color:#f59e0b">All prizes awarded!</div>
        <div style="color:#64748b;font-size:12px;margin-top:5px">Congratulations to all winners! 🎉</div>
      </div>`:""}
    ` : state.tab === "goals" ? `
      <!-- GOALS TAB -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:8px">
        <div style="font-size:12px;color:#64748b">${state.lastUpdated?"Updated "+state.lastUpdated.toLocaleTimeString():RESULTS.length+" matches"} · Auto-refreshes 5am BST</div>
        <button class="refresh-btn" onclick="refreshResults()" ${state.refreshing?"disabled":""}>${state.refreshing?"Updating...":"🔄 Refresh"}</button>
      </div>
      ${state.refreshError?`<div style="background:#1e0a0a;border:1px solid #ef4444;border-radius:8px;padding:9px 13px;color:#ef4444;font-size:12px;margin-bottom:13px">${state.refreshError}</div>`:""}
      <div style="display:flex;gap:9px;margin-bottom:18px;flex-wrap:wrap">
        ${[{label:"Total Goals",value:totalGoals,emoji:"⚽"},{label:"Played",value:RESULTS.length,emoji:"🏟"},{label:"Per Game",value:(totalGoals/RESULTS.length).toFixed(1),emoji:"📊"}].map(s=>`
        <div class="stat-card">
          <div style="font-size:20px">${s.emoji}</div>
          <div style="font-size:26px;font-weight:900;color:#f59e0b;line-height:1.1">${s.value}</div>
          <div style="font-size:11px;color:#64748b;margin-top:3px">${s.label}</div>
        </div>`).join("")}
      </div>
      <div class="card" style="padding:13px 15px;margin-bottom:18px">
        <div class="section-label">Top Scoring Teams</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${topScorers.map(([team,goals],i)=>`
          <div style="display:flex;align-items:center;gap:9px">
            <span style="font-size:11px;color:#64748b;width:14px;text-align:right">${i+1}</span>
            <span style="font-size:17px">${FLAG(team)}</span>
            <span style="flex:1;font-size:13px;font-weight:500">${team}</span>
            <div style="display:flex;gap:2px">${Array.from({length:Math.min(goals,10)}).map(()=>'<span style="font-size:10px">⚽</span>').join("")}</div>
            <span style="font-size:14px;font-weight:800;color:#f59e0b;min-width:18px;text-align:right">${goals}</span>
          </div>`).join("")}
        </div>
      </div>
      ${Object.entries(byDate).map(([date,matches])=>`
      <div style="margin-bottom:14px">
        <div class="section-label">${date}</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          ${matches.map(m=>`
          <div class="card" style="padding:10px 13px;display:flex;align-items:center;gap:7px">
            <div style="display:flex;align-items:center;gap:5px;flex:1;justify-content:flex-end">
              <span style="font-size:13px;font-weight:600">${m.home}</span>
              <span style="font-size:17px">${FLAG(m.home)}</span>
            </div>
            <div style="text-align:center;min-width:50px">
              <div style="font-weight:900;font-size:17px;color:#f59e0b">${m.hs}-${m.as}</div>
              <div style="font-size:10px;color:#64748b">${m.hs+m.as} goals</div>
            </div>
            <div style="display:flex;align-items:center;gap:5px;flex:1">
              <span style="font-size:17px">${FLAG(m.away)}</span>
              <span style="font-size:13px;font-weight:600">${m.away}</span>
            </div>
          </div>`).join("")}
        </div>
      </div>`).join("")}
    ` : `
      <!-- FIXTURES TAB -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <p style="color:#64748b;font-size:11px;margin:0">🟡 = sweepstake team · ✅ = played · BST</p>
        <button class="refresh-btn" onclick="refreshResults()" ${state.refreshing?"disabled":""}>${state.refreshing?"Updating...":"🔄 Refresh"}</button>
      </div>
      ${state.refreshError?`<div style="background:#1e0a0a;border:1px solid #ef4444;border-radius:8px;padding:9px 13px;color:#ef4444;font-size:12px;margin-bottom:12px">${state.refreshError}</div>`:""}
      ${ALL_FIXTURES.map(({date,matches})=>`
      <div style="margin-bottom:16px">
        <div class="section-label">${date}</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          ${matches.map(m=>{
            const hp=teamToPlayer[m.home], ap=teamToPlayer[m.away];
            const highlight=hp||ap;
            const result=resultMap[m.home+"|"+m.away];
            return `<div class="fixture-row" style="background:${highlight?'linear-gradient(90deg,#150f00,#111827)':'#111827'};border:1px solid ${highlight?'rgba(245,158,11,0.4)':'#1e2a3a'};opacity:${result?0.75:1}">
              <div style="flex:1;display:flex;align-items:center;gap:5px;justify-content:flex-end;flex-wrap:wrap">
                ${hp?'<span class="pill">'+hp+'</span>':""}
                <span style="font-size:12px;font-weight:${hp?700:400};color:${hp?'#f59e0b':'#f1f5f9'}">${m.home}</span>
                <span style="font-size:16px">${FLAG(m.home)}</span>
              </div>
              <div style="min-width:60px;text-align:center">
                ${result?`<div style="font-weight:900;font-size:15px;color:#f59e0b">${result.hs}-${result.as}</div><div style="font-size:9px;color:#10b981;font-weight:700">✅ FT</div>`
                :`<div style="font-weight:700;font-size:10px;color:#64748b">vs</div><div style="font-size:9px;color:#64748b">${m.time}</div>`}
              </div>
              <div style="flex:1;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
                <span style="font-size:16px">${FLAG(m.away)}</span>
                <span style="font-size:12px;font-weight:${ap?700:400};color:${ap?'#f59e0b':'#f1f5f9'}">${m.away}</span>
                ${ap?'<span class="pill">'+ap+'</span>':""}
              </div>
            </div>`;
          }).join("")}
        </div>
      </div>`).join("")}
    `}

    </div>
  </div>`;

  // Re-focus search input if searching
  if (state.tab==="draw" && state.search) {
    const inp = document.querySelector('input[placeholder="Search..."]');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
  }
  if (state.editingPrize) {
    const inp = document.getElementById("team-input");
    if (inp) inp.focus();
  }
}

function revealNext() {
  const next = DRAW.find(d => !state.revealed.has(d.name));
  if (next) { state.revealed.add(next.name); setState({}); }
}
function revealPlayer(name) {
  state.revealed.add(name); setState({});
}
function clearPrize(id) {
  const pw = {...state.prizeWinners};
  delete pw[id];
  setState({prizeWinners:pw});
}
function handleTeamInput(val) {
  const all = [...new Set(DRAW.flatMap(d=>d.teams))];
  const sugg = val.length>=2 ? all.filter(t=>t.toLowerCase().includes(val.toLowerCase())).slice(0,6) : [];
  setState({teamInput:val, suggestions:sugg});
}
function selectSuggestion(s) {
  setState({teamInput:s, suggestions:[]});
}
function confirmPrize(prizeId) {
  const winner = findWinner(state.teamInput);
  if (!winner) return;
  const pw = {...state.prizeWinners, [prizeId]:{team:state.teamInput, player:winner.name}};
  setState({prizeWinners:pw, editingPrize:null, teamInput:"", suggestions:[]});
}

render();
</script>
</body>
</html>
